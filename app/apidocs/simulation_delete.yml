Xóa một bản ghi lịch sử mô phỏng
---
security:
  - BearerAuth: []
parameters:
  - name: sim_id
    in: path
    required: true
    schema:
      type: integer
    description: ID của lịch sử cần xóa
responses:
  200:
    description: Xóa thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            message:
              type: string
  401:
    description: Unauthorized
  404:
    description: Không tìm thấy lịch sử