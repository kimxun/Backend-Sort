Đăng ký người dùng mới
---
parameters:
  - name: body
    in: body
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - username
            - password
            - full_name
            - email
          properties:
            username:
              type: string
              example: user2
            password:
              type: string
              example: user123
            full_name:
              type: string
              example: Nguyen Van B
            email:
              type: string
              example: user2@example.com
responses:
  201:
    description: Đăng ký thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            success:
              type: boolean
            data:
              type: object
              properties:
                token:
                  type: string
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    username:
                      type: string
                    full_name:
                      type: string
                    email:
                      type: string
                    role:
                      type: integer
  400:
    description: Thiếu dữ liệu hoặc tài khoản/email đã tồn tại
  500:
    description: Lỗi server
