Cập nhật một bản ghi lịch sử mô phỏng
---
security:
  - BearerAuth: []
parameters:
  - name: sim_id
    in: path
    required: true
    schema:
      type: integer
    description: ID của lịch sử cần cập nhật
  - name: body
    in: body
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            user_id:
              type: integer
            algorithm_id:
              type: integer
            input_data:
              type: string
            sorted_result:
              type: string
            steps:
              type: integer
            comparisons:
              type: integer
            swaps:
              type: integer
            execution_time_ms:
              type: integer
responses:
  200:
    description: Cập nhật thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            algorithm_id:
              type: integer
            input_data:
              type: string
            sorted_result:
              type: string
            steps:
              type: integer
            comparisons:
              type: integer
            swaps:
              type: integer
            execution_time_ms:
              type: integer
            executed_at:
              type: string
              format: date-time
  400:
    description: Dữ liệu không hợp lệ
  401:
    description: Unauthorized
  404:
    description: Không tìm thấy lịch sử