tags:
  - Users
summary: Xóa người dùng (chỉ admin)
description: Xóa một người dùng khỏi hệ thống (yêu cầu token và quyền admin).

security:
  - BearerAuth: []

parameters:
  - name: user_id
    in: path
    required: true
    type: integer
    description: ID của người dùng cần xóa
    example: 1

responses:
  200:
    description: Xóa thành công
    schema:
      type: object
      properties:
        message:
          type: string
          example: "User deleted"
  404:
    description: Không tìm thấy người dùng
  401:
    description: Unauthorized
  403:
    description: Forbidden