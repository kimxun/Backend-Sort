Xóa người dùng (chỉ admin)
---
security:
  - BearerAuth: []
parameters:
  - name: user_id
    in: path
    required: true
    schema:
      type: integer
    description: ID của người dùng cần xóa
responses:
  200:
    description: Xóa thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            message:
              type: string
  401:
    description: Unauthorized
  403:
    description: Forbidden
  404:
    description: Không tìm thấy người dùng