Lấy chi tiết một lịch sử mô phỏng
---
security:
  - BearerAuth: []
parameters:
  - name: sim_id
    in: path
    required: true
    schema:
      type: integer
responses:
  200:
    description: Thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            algorithm_id:
              type: integer
            input_data:
              type: string
            sorted_result:
              type: string
            steps:
              type: integer
            comparisons:
              type: integer
            swaps:
              type: integer
            execution_time_ms:
              type: integer
            executed_at:
              type: string
              format: date-time
  404:
    description: Không tìm thấy
  401:
    description: Unauthorized