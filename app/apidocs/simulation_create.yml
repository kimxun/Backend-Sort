Tạo mới một bản ghi lịch sử mô phỏng
---
security:
  - BearerAuth: []
parameters:
  - name: body
    in: body
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - user_id
            - algorithm_id
            - input_data
            - sorted_result
          properties:
            user_id:
              type: integer
            algorithm_id:
              type: integer
            input_data:
              type: string
            sorted_result:
              type: string
            steps:
              type: integer
            comparisons:
              type: integer
            swaps:
              type: integer
            execution_time_ms:
              type: integer
responses:
  201:
    description: Tạo thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            algorithm_id:
              type: integer
            input_data:
              type: string
            sorted_result:
              type: string
            steps:
              type: integer
            comparisons:
              type: integer
            swaps:
              type: integer
            execution_time_ms:
              type: integer
            executed_at:
              type: string
              format: date-time
  400:
    description: Thiếu dữ liệu hoặc lỗi
  401:
    description: Unauthorized