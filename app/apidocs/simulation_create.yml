tags:
  - Simulations
summary: Tạo mới bản ghi lịch sử mô phỏng
description: Tạo mới một bản ghi lịch sử mô phỏng (yêu cầu token).

security:
  - BearerAuth: []

parameters:
  - name: body
    in: body
    required: true
    description: Dữ liệu tạo mới
    schema:
      type: object
      required:
        - user_id
        - algorithm_id
        - input_data
        - sorted_result
      properties:
        user_id:
          type: integer
          example: 1
        algorithm_id:
          type: integer
          example: 1
        input_data:
          type: string
          example: "[5, 3, 8, 1]"
        sorted_result:
          type: string
          example: "[1, 3, 5, 8]"
        steps:
          type: integer
          example: 10
        comparisons:
          type: integer
          example: 6
        swaps:
          type: integer
          example: 3
        execution_time_ms:
          type: integer
          example: 2

responses:
  201:
    description: Tạo thành công
    schema:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        algorithm_id:
          type: integer
        input_data:
          type: string
        sorted_result:
          type: string
        steps:
          type: integer
        comparisons:
          type: integer
        swaps:
          type: integer
        execution_time_ms:
          type: integer
        executed_at:
          type: string
          format: date-time
  400:
    description: Thiếu dữ liệu hoặc lỗi
  401:
    description: Unauthorized