Cập nhật thông tin người dùng (chỉ admin)
---
security:
  - BearerAuth: []
parameters:
  - name: user_id
    in: path
    required: true
    schema:
      type: integer
    description: ID của người dùng cần cập nhật
  - name: body
    in: body
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              type: string
            password:
              type: string
            full_name:
              type: string
            email:
              type: string
            role:
              type: integer
responses:
  200:
    description: Cập nhật thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            full_name:
              type: string
            email:
              type: string
            role:
              type: integer
            created_at:
              type: string
              format: date-time
  400:
    description: Dữ liệu không hợp lệ
  401:
    description: Unauthorized
  403:
    description: Forbidden (không phải admin)
  404:
    description: Không tìm thấy người dùng