Lấy danh sách người dùng (chỉ admin)
---
security:
  - BearerAuth: []
responses:
  200:
    description: Thành công
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              username:
                type: string
              full_name:
                type: string
              email:
                type: string
              role:
                type: integer
              created_at:
                type: string
                format: date-time
  401:
    description: Unauthorized
  403:
    description: Forbidden