tags:
  - Authenticate
summary: Đăng nhập
description: Xác thực người dùng và trả về token JWT.

parameters:
  - name: body
    in: body
    required: true
    description: Thông tin đăng nhập
    schema:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123

responses:
  200:
    description: Đăng nhập thành công
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIs..."
            user:
              type: object
              properties:
                id:
                  type: integer
                  example: 1
                username:
                  type: string
                  example: admin
                full_name:
                  type: string
                  example: Administrator
                email:
                  type: string
                  example: admin@example.com
                role:
                  type: integer
                  example: 1
  401:
    description: Sai tài khoản hoặc mật khẩu