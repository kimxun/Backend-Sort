Tạo người dùng mới (chỉ admin)
---
security:
  - BearerAuth: []
parameters:
  - name: body
    in: body
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              type: string
            password:
              type: string
            full_name:
              type: string
            email:
              type: string
            role:
              type: integer
responses:
  201:
    description: Tạo thành công
    content:
      application/json:
        schema:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            full_name:
              type: string
            email:
              type: string
            role:
              type: integer
            created_at:
              type: string
              format: date-time
  400:
    description: Thiếu dữ liệu
  401:
    description: Unauthorized
  403:
    description: Forbidden