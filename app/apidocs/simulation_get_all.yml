tags:
  - Simulations
summary: Lấy tất cả lịch sử mô phỏng (chỉ admin)
description: Trả về danh sách tất cả các bản ghi lịch sử mô phỏng (yêu cầu token và quyền admin).

security:
  - BearerAuth: []

responses:
  200:
    description: Thành công
    schema:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
            example: 1
          user_id:
            type: integer
            example: 1
          algorithm_id:
            type: integer
            example: 1
          input_data:
            type: string
            example: "[5, 3, 8, 1]"
          sorted_result:
            type: string
            example: "[1, 3, 5, 8]"
          steps:
            type: integer
            example: 10
          comparisons:
            type: integer
            example: 6
          swaps:
            type: integer
            example: 3
          execution_time_ms:
            type: integer
            example: 2
          executed_at:
            type: string
            format: date-time
            example: "2026-06-17T21:53:34"
  401:
    description: Unauthorized
  403:
    description: Forbidden